<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de franquiciatario | Dr. Miguel Ávila</title>
<meta name="description" content="Descubre si tu perfil es compatible con la operación de una franquicia: cumplimiento de sistema vs. necesidad de autoría.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
  @font-face {
    font-family: 'Source Serif';
    src: local('Georgia');
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000000;
    color: #f2f0f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 64px;
  }
  .logo {
    width: 160px;
    height: auto;
    margin-bottom: 40px;
    opacity: 0.96;
  }
  .container {
    width: 100%;
    max-width: 640px;
  }
  button {
    font-family: inherit;
  }
  ::selection { background: #572c80; color: #fff; }
  a { color: #9b6fc4; }

  .q-progress-wrap { margin-bottom: 40px; }
  .q-progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: #8a8694; margin-bottom: 8px;
  }
  .q-track { height: 1px; background: #3a3640; width: 100%; }
  .q-fill { height: 1px; background: #9b6fc4; transition: width .35s ease; }

  .q-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 24px; line-height: 1.45; font-weight: 400;
    margin: 0 0 36px; color: #f2f0f5;
  }

  .opt-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
  .opt-btn {
    text-align: left; display: flex; align-items: center; gap: 14px;
    padding: 13px 16px; border-radius: 6px; border: 0.5px solid #3a3640;
    background: transparent; cursor: pointer; font-size: 14px; color: #f2f0f5;
    transition: border-color .15s, background .15s;
  }
  .opt-btn:hover { border-color: #572c80; background: rgba(87,44,128,0.12); }
  .opt-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid #8a8694; flex-shrink: 0;
  }
  .opt-label { text-transform: capitalize; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .back-btn {
    font-size: 13px; color: #8a8694; background: none; border: none;
    cursor: pointer; padding: 6px 0;
  }

  .eyebrow {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #9b6fc4; margin: 0 0 8px;
  }
  .result-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 28px; line-height: 1.3; font-weight: 400;
    margin: 0 0 28px; color: #f2f0f5;
  }

  .matrix-outer { margin-bottom: 28px; }
  .matrix-box {
    position: relative; width: 100%; aspect-ratio: 1 / 0.78;
    border: 0.5px solid #3a3640; border-radius: 6px;
  }
  .matrix-mid-v { position: absolute; left: 50%; top: 0; bottom: 0; width: 0.5px; background: #3a3640; }
  .matrix-mid-h { position: absolute; top: 50%; left: 0; right: 0; height: 0.5px; background: #3a3640; }
  .matrix-axis-label {
    position: absolute; font-size: 10px; letter-spacing: 0.05em;
    text-transform: uppercase; color: #8a8694; white-space: nowrap;
  }
  .matrix-point {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: #9b6fc4; transform: translate(-50%,-50%);
  }
  .matrix-ring {
    position: absolute; width: 28px; height: 28px; border-radius: 50%;
    border: 0.5px solid #572c80; transform: translate(-50%,-50%);
  }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .metric-card {
    background: rgba(87,44,128,0.14); border-radius: 6px; padding: 16px;
  }
  .metric-label { font-size: 13px; color: #8a8694; margin: 0 0 4px; }
  .metric-value { font-size: 24px; font-weight: 500; margin: 0; color: #f2f0f5; }

  .desc-p { font-size: 15px; line-height: 1.7; color: #bdb8c6; margin: 0 0 32px; }
  .divider { height: 0.5px; background: #3a3640; margin: 0 0 32px; }

  .close-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 19px; font-weight: 400; margin: 0 0 16px; color: #f2f0f5;
  }
  .close-body { font-size: 14px; line-height: 1.75; color: #bdb8c6; margin: 0 0 28px; }
  .close-subtitle {
    font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
    color: #f2f0f5; margin: 0 0 14px;
  }
  .close-item { margin: 0 0 16px; }
  .close-item-label {
    font-size: 14px; font-weight: 600; color: #d8b8f0; margin: 0 0 4px;
  }
  .close-item-body { font-size: 14px; line-height: 1.7; color: #bdb8c6; margin: 0; }

  .cta-primary {
    display: block; width: 100%; text-align: center; padding: 14px;
    border-radius: 6px; border: 0.5px solid #572c80; background: #572c80;
    color: #f2f0f5; font-size: 14px; font-weight: 500; cursor: pointer;
    text-decoration: none; margin-bottom: 12px;
  }
  .cta-primary:hover { background: #6b3a9e; }

  .cta-whatsapp {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; text-align: center; padding: 13px;
    border-radius: 6px; border: 0.5px solid #3a3640; background: transparent;
    color: #f2f0f5; font-size: 14px; font-weight: 500; cursor: pointer;
    text-decoration: none; margin-bottom: 24px;
  }
  .cta-whatsapp:hover { border-color: #25D366; color: #25D366; }

  .cta-pdf {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; text-align: center; padding: 13px;
    border-radius: 6px; border: 0.5px solid #3a3640; background: transparent;
    color: #f2f0f5; font-size: 14px; font-weight: 500; cursor: pointer;
    margin-bottom: 12px;
  }
  .cta-pdf:hover { border-color: #9b6fc4; color: #9b6fc4; }
  .cta-pdf:disabled { opacity: 0.5; cursor: wait; }

  .cta-website {
    display: block; width: 100%; text-align: center; padding: 13px;
    border-radius: 6px; border: 0.5px solid #3a3640; background: transparent;
    color: #8a8694; font-size: 13px; cursor: pointer;
    text-decoration: none; margin-bottom: 24px;
  }
  .cta-website:hover { border-color: #572c80; color: #9b6fc4; }

  .share-row {
    display: flex; align-items: center; gap: 8px; padding: 12px 14px;
    border-radius: 6px; background: #140a1d; margin-bottom: 24px;
  }
  .share-text {
    font-size: 12px; color: #8a8694; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .copy-btn {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    padding: 7px 12px; border-radius: 6px; border: 0.5px solid #3a3640;
    background: transparent; cursor: pointer; color: #f2f0f5; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: #572c80; }

  .restart-btn {
    display: block; margin: 0 auto; font-size: 12px; color: #8a8694;
    background: none; border: none; cursor: pointer;
  }
  .site-link {
    display: block; text-align: center; margin-top: 12px; font-size: 12px;
    color: #8a8694; text-decoration: none;
  }
  .site-link:hover { color: #9b6fc4; }
</style>

var state = { idx: 0, answers: new Array(QUESTIONS.length).fill(null), done: false };

function el(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }

function quadrantKey(sis, aut){
  var highSis = sis >= 50;
  var highAut = aut >= 50;
  if(highSis && !highAut) return 'ideal';
  if(highSis && highAut) return 'canalizable';
  if(!highSis && !highAut) return 'riesgo';
  return 'emprendedor';
}

function render(){
  var app = document.getElementById('app');
  app.innerHTML = '';
  if(!state.done){
    app.appendChild(renderQuestion());
  } else {
    app.appendChild(renderResult());
  }
}

function renderQuestion(){
  var q = QUESTIONS[state.idx];
  var pct = Math.round((state.idx)/QUESTIONS.length*100);
  var wrap = el('<div></div>');

  var progWrap = el('<div class="q-progress-wrap"></div>');
  var progLabel = el('<div class="q-progress-label"><span>Pregunta '+(state.idx+1)+' de '+QUESTIONS.length+'</span><span>'+pct+'%</span></div>');
  var track = el('<div class="q-track"></div>');
  var fill = el('<div class="q-fill" style="width:'+pct+'%;"></div>');
  track.appendChild(fill);
  progWrap.appendChild(progLabel);
  progWrap.appendChild(track);
  wrap.appendChild(progWrap);

  var qText = el('<p class="q-text"></p>');
  qText.textContent = q.text;
  wrap.appendChild(qText);

  var opts = el('<div class="opt-list"></div>');
  SCALE.forEach(function(s){
    var btn = el('<button type="button" class="opt-btn"><span class="opt-dot"></span><span class="opt-label"></span></button>');
    btn.querySelector('.opt-label').textContent = s.label;
    btn.addEventListener('click', function(){
      var val = q.inverse ? (6 - s.v) : s.v;
      state.answers[state.idx] = {axis:q.axis, v:val};
      if(state.idx < QUESTIONS.length-1){ state.idx++; render(); window.scrollTo(0,0); }
      else { state.done = true; render(); window.scrollTo(0,0); }
    });
    opts.appendChild(btn);
  });
  wrap.appendChild(opts);

  var nav = el('<div class="nav-row"></div>');
  var back = el('<button type="button" class="back-btn">← anterior</button>');
  back.style.visibility = state.idx === 0 ? 'hidden' : 'visible';
  back.addEventListener('click', function(){ if(state.idx>0){ state.idx--; render(); window.scrollTo(0,0); } });
  nav.appendChild(back);
  wrap.appendChild(nav);

  return wrap;
}

function computeProfile(answers){
  var sis = answers.filter(function(a){return a.axis==='sistema';});
  var aut = answers.filter(function(a){return a.axis==='autoria';});
  var sisScore = sis.reduce(function(s,a){return s+a.v;},0) / (sis.length*5) * 100;
  var autScore = aut.reduce(function(s,a){return s+a.v;},0) / (aut.length*5) * 100;
  return { sistema: Math.round(sisScore), autoria: Math.round(autScore) };
}

function buildShareUrl(p){
  var base = window.location.origin + window.location.pathname;
  return base + '?s=' + p.sistema + '&a=' + p.autoria;
}

function readSharedResult(){
  var params = new URLSearchParams(window.location.search);
  if(params.has('s') && params.has('a')){
    var sis = parseInt(params.get('s'), 10);
    var aut = parseInt(params.get('a'), 10);
    if(!isNaN(sis) && !isNaN(aut) && sis>=0 && sis<=100 && aut>=0 && aut<=100){
      return { sistema: sis, autoria: aut };
    }
  }
  return null;
}

      navigator.clipboard.writeText(shareUrl);
    } else {
      var ta = document.createElement('textarea');
      ta.value = shareUrl; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    copyBtn.querySelector('span').textContent = 'copiado';
    setTimeout(function(){ copyBtn.querySelector('span').textContent = 'copiar enlace'; }, 1800);
  });
  wrap.appendChild(shareRow);

  if(allowRestart){
    var restart = el('<button type="button" class="restart-btn">repetir el test</button>');
    restart.addEventListener('click', function(){
      window.history.replaceState({}, '', window.location.pathname);
      state.idx=0; state.answers=new Array(QUESTIONS.length).fill(null); state.done=false; render(); window.scrollTo(0,0);
    });
    wrap.appendChild(restart);
  } else {
    var restart2 = el('<button type="button" class="restart-btn">hacer el test</button>');
    restart2.addEventListener('click', function(){
      window.history.replaceState({}, '', window.location.pathname);
      state.idx=0; state.answers=new Array(QUESTIONS.length).fill(null); state.done=false; render(); window.scrollTo(0,0);
    });
    wrap.appendChild(restart2);
  }

  var websiteBtn = el('<a class="cta-website" target="_blank" rel="noopener">← Volver a drmiguelavila.com</a>');
  websiteBtn.href = 'https://www.drmiguelavila.com';
  wrap.appendChild(websiteBtn);

  return wrap;
}

// Init: if a shared result is in the URL, show it directly without the quiz
var shared = readSharedResult();
if(shared){
  state.done = true;
  var app = document.getElementById('app');
  var key = quadrantKey(shared.sistema, shared.autoria);
  app.appendChild(buildResultDOM(shared, PROFILES[key], false));
} else {
  render();
}

})();
</script>
</body>
</html>
