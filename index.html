<title>Perfil de franquiciatario | Dr. Miguel Ávila</title>
<meta name="description" content="Descubre si tu perfil es compatible con la operación de una franquicia: cumplimiento de sistema vs. necesidad de autoría.">
<style>
  @font-face {
    font-family: 'Source Serif';
    src: local('Georgia');
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000000;
    color: #f2f0f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 64px;
  }
  .logo {
    width: 40px;
    height: auto;
    margin-bottom: 40px;
    opacity: 0.92;
  }
  .container {
    width: 100%;
    max-width: 640px;
  }
  button {
    font-family: inherit;
  }
  ::selection { background: #572c80; color: #fff; }
  a { color: #9b6fc4; }

  .q-progress-wrap { margin-bottom: 40px; }
  .q-progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: #8a8694; margin-bottom: 8px;
  }
  .q-track { height: 1px; background: #3a3640; width: 100%; }
  .q-fill { height: 1px; background: #9b6fc4; transition: width .35s ease; }

  .q-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 24px; line-height: 1.45; font-weight: 400;
    margin: 0 0 36px; color: #f2f0f5;
  }

  .opt-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
  .opt-btn {
    text-align: left; display: flex; align-items: center; gap: 14px;
    padding: 13px 16px; border-radius: 6px; border: 0.5px solid #3a3640;
    background: transparent; cursor: pointer; font-size: 14px; color: #f2f0f5;
    transition: border-color .15s, background .15s;
  }
  .opt-btn:hover { border-color: #572c80; background: rgba(87,44,128,0.12); }
  .opt-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid #8a8694; flex-shrink: 0;
  }
  .opt-label { text-transform: capitalize; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .back-btn {
    font-size: 13px; color: #8a8694; background: none; border: none;
    cursor: pointer; padding: 6px 0;
  }

  .eyebrow {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #9b6fc4; margin: 0 0 8px;
  }
  .result-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 28px; line-height: 1.3; font-weight: 400;
    margin: 0 0 28px; color: #f2f0f5;
  }

  .matrix-outer { margin-bottom: 28px; }
  .matrix-box {
    position: relative; width: 100%; aspect-ratio: 1 / 0.78;
    border: 0.5px solid #3a3640; border-radius: 6px;
  }
  .matrix-mid-v { position: absolute; left: 50%; top: 0; bottom: 0; width: 0.5px; background: #3a3640; }
  .matrix-mid-h { position: absolute; top: 50%; left: 0; right: 0; height: 0.5px; background: #3a3640; }
  .matrix-axis-label {
    position: absolute; font-size: 10px; letter-spacing: 0.05em;
    text-transform: uppercase; color: #8a8694; white-space: nowrap;
  }
  .matrix-point {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: #9b6fc4; transform: translate(-50%,-50%);
  }
  .matrix-ring {
    position: absolute; width: 28px; height: 28px; border-radius: 50%;
    border: 0.5px solid #572c80; transform: translate(-50%,-50%);
  }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .metric-card {
    background: rgba(87,44,128,0.14); border-radius: 6px; padding: 16px;
  }
  .metric-label { font-size: 13px; color: #8a8694; margin: 0 0 4px; }
  .metric-value { font-size: 24px; font-weight: 500; margin: 0; color: #f2f0f5; }

  .desc-p { font-size: 15px; line-height: 1.7; color: #bdb8c6; margin: 0 0 32px; }
  .divider { height: 0.5px; background: #3a3640; margin: 0 0 32px; }

  .close-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 19px; font-weight: 400; margin: 0 0 16px; color: #f2f0f5;
  }
  .close-body { font-size: 14px; line-height: 1.75; color: #bdb8c6; margin: 0 0 28px; }

  .cta-primary {
    display: block; width: 100%; text-align: center; padding: 14px;
    border-radius: 6px; border: 0.5px solid #572c80; background: #572c80;
    color: #f2f0f5; font-size: 14px; font-weight: 500; cursor: pointer;
    text-decoration: none; margin-bottom: 12px;
  }
  .cta-primary:hover { background: #6b3a9e; }

  .cta-whatsapp {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; text-align: center; padding: 13px;
    border-radius: 6px; border: 0.5px solid #3a3640; background: transparent;
    color: #f2f0f5; font-size: 14px; font-weight: 500; cursor: pointer;
    text-decoration: none; margin-bottom: 24px;
  }
  .cta-whatsapp:hover { border-color: #25D366; color: #25D366; }

  .share-row {
    display: flex; align-items: center; gap: 8px; padding: 12px 14px;
    border-radius: 6px; background: #140a1d; margin-bottom: 24px;
  }
  .share-text {
    font-size: 12px; color: #8a8694; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .copy-btn {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    padding: 7px 12px; border-radius: 6px; border: 0.5px solid #3a3640;
    background: transparent; cursor: pointer; color: #f2f0f5; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: #572c80; }

  .restart-btn {
    display: block; margin: 0 auto; font-size: 12px; color: #8a8694;
    background: none; border: none; cursor: pointer;
  }
  .site-link {
    display: block; text-align: center; margin-top: 12px; font-size: 12px;
    color: #8a8694; text-decoration: none;
  }
  .site-link:hover { color: #9b6fc4; }
</style>

  { axis: 'autoria', text: 'Necesito que un negocio lleve mi sello personal para sentirlo realmente mío.' },

  { axis: 'autoria', text: 'Si una marca me limita en cómo comunicar o vender, lo vivo como una frustración constante.' },
  { axis: 'sistema', text: 'Las auditorías o supervisiones de cumplimiento no me generan resistencia, las veo como parte normal del trabajo.' },
  { axis: 'autoria', text: 'Disfruto más diseñar algo desde cero que perfeccionar algo que alguien más diseñó.' },
  { axis: 'sistema', text: 'Cuando un proceso cambia desde la central, lo adopto sin necesidad de cuestionarlo primero.' },
  { axis: 'autoria', text: 'Me identifico como alguien inquieto, que necesita variedad y novedad para mantenerse motivado.' },
  { axis: 'sistema', text: 'Prefiero que me digan exactamente qué hacer a tener que decidir el cómo desde cero.' },
  { axis: 'autoria', text: 'Si veo una oportunidad de mejora, actúo primero y pido permiso después.' }
];

var SCALE = [
  {v:1, label:'totalmente en desacuerdo'},
  {v:2, label:'en desacuerdo'},
  {v:3, label:'neutral'},
  {v:4, label:'de acuerdo'},
  {v:5, label:'totalmente de acuerdo'}
];

var PROFILES = {
  ideal: {
    name: 'Ejecutor fiel',
    desc: 'Tu perfil muestra alta disciplina de sistema y baja necesidad de autoría. Es el perfil que mejor se adapta a la lógica estructural de una franquicia: replicar con consistencia un modelo que ya funciona, sin necesidad de dejar tu huella creativa en el proceso.'
  },
  canalizable: {
    name: 'Disciplinado con inquietud creativa',
    desc: 'Sigues sistemas con disciplina, pero también necesitas espacio para crear. Puedes operar bien una franquicia si encuentras dónde canalizar esa necesidad de autoría fuera de la unidad operativa, por ejemplo en comités de innovación o en un segundo proyecto propio.'
  },
  riesgo: {
    name: 'Posible negligencia operativa',
    desc: 'Tu perfil muestra baja disciplina de sistema y baja necesidad de autoría. No es un perfil rebelde, sino uno que puede desatender procesos sin proponérselo. Antes de invertir, vale la pena fortalecer hábitos de seguimiento y supervisión externa.'
  },
  emprendedor: {
    name: 'Emprendedor, no franquiciatario',
    desc: 'Tu perfil muestra baja disciplina de sistema y alta necesidad de autoría. Es probable que la lógica de franquicia, replicar fielmente un modelo ajeno, te resulte frustrante con el tiempo. Tu energía natural parece estar mejor dirigida hacia construir algo propio desde cero.'
  }
};

var state = { idx: 0, answers: new Array(QUESTIONS.length).fill(null), done: false };

function el(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }

function quadrantKey(sis, aut){
  var highSis = sis >= 50;
  var highAut = aut >= 50;
  if(highSis && !highAut) return 'ideal';
  if(highSis && highAut) return 'canalizable';
  if(!highSis && !highAut) return 'riesgo';
  return 'emprendedor';
}

function render(){
  var app = document.getElementById('app');
  app.innerHTML = '';
  if(!state.done){
    app.appendChild(renderQuestion());
  } else {
    app.appendChild(renderResult());
  }
}

function renderQuestion(){
  var q = QUESTIONS[state.idx];
  var pct = Math.round((state.idx)/QUESTIONS.length*100);
  var wrap = el('<div></div>');

  var progWrap = el('<div class="q-progress-wrap"></div>');
  var progLabel = el('<div class="q-progress-label"><span>Pregunta '+(state.idx+1)+' de '+QUESTIONS.length+'</span><span>'+pct+'%</span></div>');
  var track = el('<div class="q-track"></div>');
  var fill = el('<div class="q-fill" style="width:'+pct+'%;"></div>');
  track.appendChild(fill);
  progWrap.appendChild(progLabel);
  progWrap.appendChild(track);
  wrap.appendChild(progWrap);

  var qText = el('<p class="q-text"></p>');
  qText.textContent = q.text;
  wrap.appendChild(qText);

  var opts = el('<div class="opt-list"></div>');
  SCALE.forEach(function(s){
    var btn = el('<button type="button" class="opt-btn"><span class="opt-dot"></span><span class="opt-label"></span></button>');
    btn.querySelector('.opt-label').textContent = s.label;
    btn.addEventListener('click', function(){
      state.answers[state.idx] = {axis:q.axis, v:s.v};
      if(state.idx < QUESTIONS.length-1){ state.idx++; render(); window.scrollTo(0,0); }
      else { state.done = true; render(); window.scrollTo(0,0); }
    });
    opts.appendChild(btn);
  });
  wrap.appendChild(opts);

  var nav = el('<div class="nav-row"></div>');
  var back = el('<button type="button" class="back-btn">← anterior</button>');
  back.style.visibility = state.idx === 0 ? 'hidden' : 'visible';
  back.addEventListener('click', function(){ if(state.idx>0){ state.idx--; render(); window.scrollTo(0,0); } });
  nav.appendChild(back);
  wrap.appendChild(nav);

  return wrap;
}

function computeProfile(answers){
  var sis = answers.filter(function(a){return a.axis==='sistema';});
  var aut = answers.filter(function(a){return a.axis==='autoria';});
  var sisScore = sis.reduce(function(s,a){return s+a.v;},0) / (sis.length*5) * 100;
  var autScore = aut.reduce(function(s,a){return s+a.v;},0) / (aut.length*5) * 100;
  return { sistema: Math.round(sisScore), autoria: Math.round(autScore) };
}

function buildShareUrl(p){
  var base = window.location.origin + window.location.pathname;
  return base + '?s=' + p.sistema + '&a=' + p.autoria;
}

function readSharedResult(){
  var params = new URLSearchParams(window.location.search);
  if(params.has('s') && params.has('a')){
    var sis = parseInt(params.get('s'), 10);
    var aut = parseInt(params.get('a'), 10);
    if(!isNaN(sis) && !isNaN(aut) && sis>=0 && sis<=100 && aut>=0 && aut<=100){
      return { sistema: sis, autoria: aut };
    }
  }
  return null;
}

function renderResult(){
  var p = computeProfile(state.answers);
  var key = quadrantKey(p.sistema, p.autoria);
  var prof = PROFILES[key];
  return buildResultDOM(p, prof, true);
}

function buildResultDOM(p, prof, allowRestart){
  var wrap = el('<div></div>');

  wrap.appendChild(el('<p class="eyebrow">Resultado del perfil</p>'));

  var title = el('<p class="result-title"></p>');
  title.textContent = prof.name;
  wrap.appendChild(title);

  var matrixOuter = el('<div class="matrix-outer"></div>');
  var matrixBox = el('<div class="matrix-box"></div>');
  matrixBox.appendChild(el('<div class="matrix-mid-v"></div>'));
  matrixBox.appendChild(el('<div class="matrix-mid-h"></div>'));

  var labels = [
    {text:'alta autoría', style:'top:8px; left:50%; transform:translateX(-50%);'},
    {text:'baja autoría', style:'bottom:8px; left:50%; transform:translateX(-50%);'},
    {text:'bajo cumplimiento', style:'top:50%; left:8px; transform:translateY(-50%) rotate(-90deg); transform-origin:left center;'},
    {text:'alto cumplimiento', style:'top:50%; right:8px; transform:translateY(-50%) rotate(90deg); transform-origin:right center;'}
  ];
  labels.forEach(function(l){
    var L = el('<span class="matrix-axis-label"></span>');
    L.setAttribute('style', L.getAttribute('style') + l.style);
    L.textContent = l.text;
    matrixBox.appendChild(L);
  });

  var px = 6 + (p.sistema/100)*88;
  var py = 94 - (p.autoria/100)*88;
  var point = el('<div class="matrix-point"></div>');
  point.style.left = px + '%'; point.style.top = py + '%';
  matrixBox.appendChild(point);
  var ring = el('<div class="matrix-ring"></div>');
  ring.style.left = px + '%'; ring.style.top = py + '%';
  matrixBox.appendChild(ring);

  matrixOuter.appendChild(matrixBox);
  wrap.appendChild(matrixOuter);

  var metrics = el('<div class="metrics-grid"></div>');
  var m1 = el('<div class="metric-card"><p class="metric-label">Cumplimiento de sistema</p><p class="metric-value"></p></div>');
  m1.querySelector('.metric-value').textContent = p.sistema;
  var m2 = el('<div class="metric-card"><p class="metric-label">Necesidad de autoría</p><p class="metric-value"></p></div>');
  m2.querySelector('.metric-value').textContent = p.autoria;
  metrics.appendChild(m1); metrics.appendChild(m2);
  wrap.appendChild(metrics);

  var descP = el('<p class="desc-p"></p>');
  descP.textContent = prof.desc;
  wrap.appendChild(descP);

  wrap.appendChild(el('<div class="divider"></div>'));

  wrap.appendChild(el('<p class="eyebrow">Antes de decidir, una aclaración</p>'));
  wrap.appendChild(el('<p class="close-title">Qué es una franquicia, desde el lugar del franquiciatario</p>'));
  wrap.appendChild(el('<p class="close-body">No es una sociedad ni una inversión pasiva: no hay propiedad compartida del negocio ni dividendos que lleguen sin operar. No es un empleo: nadie te paga un sueldo y la responsabilidad del resultado es tuya. Y no es un espacio para reinventar el modelo: es la licencia para ejecutar, con disciplina y consistencia, un sistema que ya fue probado por alguien más. Lo que compra el franquiciatario no es libertad creativa, es una probabilidad de éxito más alta a cambio de seguir reglas que no diseñó.</p>'));

  var ctaPrimary = el('<a class="cta-primary" target="_blank" rel="noopener">Agendar una conversación sobre mi resultado ↗</a>');
  ctaPrimary.href = 'https://www.yafahexpress.com/registro-franquicias';
  wrap.appendChild(ctaPrimary);

  var waMsg = 'Hola, hice el test de perfil de franquiciatario y mi resultado fue "' + prof.name + '" (cumplimiento de sistema ' + p.sistema + ', necesidad de autoría ' + p.autoria + '). Quisiera platicar sobre oportunidades de franquicia.';
  var waBtn = el('<a class="cta-whatsapp" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="flex-shrink:0;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.095 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.04 21.785h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884zm8.413-18.297A11.815 11.815 0 0 0 12.04 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.674 1.447h.005c6.545 0 11.879-5.335 11.882-11.893a11.821 11.821 0 0 0-3.47-8.412z"/></svg><span>Escribir por WhatsApp</span></a>');
  waBtn.href = 'https://wa.me/527771639759?text=' + encodeURIComponent(waMsg);
  wrap.appendChild(waBtn);

  var shareUrl = buildShareUrl(p);
  var shareRow = el('<div class="share-row"><span class="share-text"></span><button type="button" class="copy-btn"><span>copiar enlace</span></button></div>');
  shareRow.querySelector('.share-text').textContent = shareUrl;
  var copyBtn = shareRow.querySelector('.copy-btn');
  copyBtn.addEventListener('click', function(){
    if(navigator.clipboard){
      navigator.clipboard.writeText(shareUrl);
    } else {
      var ta = document.createElement('textarea');
      ta.value = shareUrl; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    copyBtn.querySelector('span').textContent = 'copiado';
    setTimeout(function(){ copyBtn.querySelector('span').textContent = 'copiar enlace'; }, 1800);
  });
  wrap.appendChild(shareRow);

  if(allowRestart){
    var restart = el('<button type="button" class="restart-btn">repetir el test</button>');
    restart.addEventListener('click', function(){
      window.history.replaceState({}, '', window.location.pathname);
      state.idx=0; state.answers=new Array(QUESTIONS.length).fill(null); state.done=false; render(); window.scrollTo(0,0);
    });
    wrap.appendChild(restart);
  } else {
    var restart2 = el('<button type="button" class="restart-btn">hacer el test</button>');
    restart2.addEventListener('click', function(){
      window.history.replaceState({}, '', window.location.pathname);
      state.idx=0; state.answers=new Array(QUESTIONS.length).fill(null); state.done=false; render(); window.scrollTo(0,0);
    });
    wrap.appendChild(restart2);
  }

  wrap.appendChild(el('<a class="site-link" href="https://drmiguelavila.com">drmiguelavila.com</a>'));

  return wrap;
}

// Init: if a shared result is in the URL, show it directly without the quiz
var shared = readSharedResult();
if(shared){
  state.done = true;
  var app = document.getElementById('app');
  var key = quadrantKey(shared.sistema, shared.autoria);
  app.appendChild(buildResultDOM(shared, PROFILES[key], false));
} else {
  render();
}

})();
</script>
</body>
</html>
